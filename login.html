<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Yuvalay</title>

    <link rel="stylesheet" href="auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Floating Shapes -->

    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>

    <section class="login-page">

        <!-- Left Side -->

        <div class="login-left">

            <div class="overlay"></div>

            <div class="left-content">

                <img src="images/logo.png" class="logo">

                <h1>
                    Welcome to
                    <span>Yuvalay</span>
                </h1>

                <p>

                    Empowering young innovators through
                    Makerspaces, Innovation, Robotics,
                    IoT, AI, Workshops and Community.

                </p>

                <div class="features">

                    <div class="feature">

                        <i class="fas fa-robot"></i>

                        <span>Robotics Lab</span>

                    </div>

                    <div class="feature">

                        <i class="fas fa-microchip"></i>

                        <span>IoT Projects</span>

                    </div>

                    <div class="feature">

                        <i class="fas fa-cube"></i>

                        <span>3D Printing</span>

                    </div>

                    <div class="feature">

                        <i class="fas fa-users"></i>

                        <span>Community</span>

                    </div>

                </div>

            </div>

        </div>



        <!-- Right Side -->

        <div class="login-right">

            <div class="login-card">

                <h2>Welcome Back 👋</h2>

                <p>

                    Login to continue your innovation journey.

                </p>

                <form>

                    <!-- Email -->

                    <div class="input-box">

                        <i class="fas fa-envelope"></i>

                        <input type="email"
                            placeholder="Email Address"
                            required>

                    </div>


                    <!-- Password -->

                    <div class="input-box">

                        <i class="fas fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Password"
                            required>

                        <i class="fas fa-eye togglePassword"
                            id="togglePassword"></i>

                    </div>


                    <div class="remember">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#">
                            Forgot Password?
                        </a>

                    </div>

                    <button type="submit"
                        class="login-btn">

                        Login

                    </button>

                </form>


                <div class="divider">

                    <span>OR</span>

                </div>


                <button class="google-btn">

                    <img src="images/google.png">

                    Continue with Google

                </button>


                <button class="github-btn">

                    <i class="fab fa-github"></i>

                    Continue with GitHub

                </button>


                <div class="signup-link">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </section>

    <script src="js/auth.js"></script>

</body>

</html>
