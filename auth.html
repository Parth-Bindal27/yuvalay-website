<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuvalay Authentication</title>
<link rel="stylesheet" href="auth.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
<div class="card">
<div class="tabs">
<button class="tab active" data-target="login">Login</button>
<button class="tab" data-target="signup">Sign Up</button>
</div>

<div id="login" class="panel active">
<h2>Welcome Back</h2>
<form>
<input type="email" placeholder="Email">
<div class="password-wrap">
<input id="loginPass" type="password" placeholder="Password">
<button type="button" class="toggle" data-input="loginPass">👁</button>
</div>
<button class="primary">Login</button>
</form>
</div>

<div id="signup" class="panel">
<h2>Create Account</h2>
<form>
<input placeholder="Full Name">
<input type="email" placeholder="Email">
<input placeholder="Mobile Number">
<select>
<option>Join As</option>
<option>Student</option>
<option>Volunteer</option>
<option>Mentor</option>
<option>Donor</option>
</select>
<div class="password-wrap">
<input id="signPass" type="password" placeholder="Password">
<button type="button" class="toggle" data-input="signPass">👁</button>
</div>
<input type="password" placeholder="Confirm Password">
<div class="strength"><div id="bar"></div></div>
<button class="primary">Create Account</button>
</form>
</div>
</div>
</div>
<script src="auth.js"></script>
</body>
</html>
