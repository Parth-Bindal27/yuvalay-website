<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <link rel="stylesheet" href="navbar.css">

    <!-- Remix Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet"
    />
</head>

<body>

<header>

    <nav class="navbar">

        <!-- Left -->
        <div class="nav-left">

            <a href="index.html" class="logo">

                <img src="images/logo.png" alt="Logo">

            </a>

        </div>

        <!-- Center -->

        <div class="nav-center" id="navMenu">

            <ul class="nav-links">

                <li><a href="#">Home</a></li>

                                <li class="dropdown">

                    <a href="about.html" class="dropdown-toggle">

                        About

                        <i class="ri-arrow-down-s-line"></i>

                    </a>

                    <ul class="dropdown-menu">

                        <li><a href="about.html#who-we-are">Who We Are</a></li>

                        <li><a href="about.html#our-story">Our Story</a></li>

                        <li><a href="about.html#mission">Mission & Vision</a></li>

                        <li><a href="about.html#journey">Innovation Journey</a></li>

                        <li><a href="about.html#facilities">Facilities</a></li>

                        <li><a href="about.html#community">Community</a></li>

                        <li><a href="about.html#gallery">Gallery</a></li>

                        <li><a href="about.html#faq">FAQs</a></li>

                        <li><a href="about.html#contact">Contact Us</a></li>

                    </ul>

                </li>

                <li><a href="#">Events</a></li>

                <li><a href="#">Gallery</a></li>

                <li><a href="#">Contact</a></li>

                <!-- Donate appears only in mobile menu -->

                <li class="mobile-donate">

                    <a href="#" class="donate-btn">

                        Donate

                    </a>

                </li>

            </ul>

        </div>

        <!-- Desktop Donate -->

        <div class="nav-right">

            <a href="#" class="donate-btn">

                Donate

            </a>

        </div>

        <!-- Hamburger -->

        <div class="hamburger" id="hamburger">

            <i class="ri-menu-3-line"></i>

        </div>

    </nav>

</header>

<script>

const hamburger = document.getElementById("hamburger");

const navMenu = document.getElementById("navMenu");

hamburger.addEventListener("click",()=>{

    navMenu.classList.toggle("active");

    hamburger.innerHTML = navMenu.classList.contains("active")
        ? '<i class="ri-close-line"></i>'
        : '<i class="ri-menu-3-line"></i>';

});

</script>

</body>
</html>
