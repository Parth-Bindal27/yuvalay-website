<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | Yuvalaya Makerspace</title>

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Navbar -->
    <link rel="stylesheet" href="../components/navbar.css">

    <!-- Footer -->
    <link rel="stylesheet" href="../components/footer.css">

    <!-- Live Notification -->
    <link rel="stylesheet" href="../webpages/home/live-notification.css">

    <!-- Signup CSS -->
    <link rel="stylesheet" href="signup.css">

</head>

<body>

    <div id="navbar"></div>

    <section class="login-section">

        <div class="login-container">

            <!-- LEFT -->

            <div class="login-left">

                <div class="login-content">

                    <span class="badge">
                        Join Our Community 🌱
                    </span>

                    <h1>
                        Create Your Yuvalaya Account
                    </h1>

                    <p>
                        Become a part of Yuvalaya Makerspace to register for events,
                        volunteer opportunities, workshops, innovation programs, and
                        stay connected with our growing community.
                    </p>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="login-right">

                <div class="login-card">

                    <h2>Create Account</h2>

                    <p>Let's get you started.</p>

                    <form id="signupForm">

                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="name" placeholder="Enter your full name" required>
                        </div>

                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>

                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" placeholder="Enter your phone number" required>
                        </div>

                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="password" placeholder="Create a password" required>
                        </div>

                        <div class="input-group">
                            <label>Confirm Password</label>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>

                        <div class="input-group">
                            <label>I am joining as</label>

                            <select id="role">

                                <option>Student</option>
                                <option>Volunteer</option>
                                <option>Mentor</option>
                                <option>Donor</option>

                            </select>

                        </div>

                        <label class="terms">

                            <input type="checkbox" required>

                            I agree to the Terms & Privacy Policy

                        </label>

                        <button type="submit">

                            Create Account

                        </button>

                    </form>

                    <div class="signup-link">

                        Already have an account?

                        <a href="login.html">

                            Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <div id="footer"></div>

    <script src="../components/navbar-loader.js"></script>
    <script src="../components/footer-loader.js"></script>
    <script src="../components/navbar.js"></script>

    <script src="auth.js"></script>

</body>

</html>
