<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Yuvalaya Makerspace</title>

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Navbar -->
    <link rel="stylesheet" href="../components/navbar.css">

    <!-- Footer -->
    <link rel="stylesheet" href="../components/footer.css">

    <!-- Login CSS -->
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../webpages/home/live-notification.css">

</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Login Section -->

    <section class="login-section">

        <div class="login-container">

            <!-- Left Side -->

            <div class="login-left">

                <div class="login-content">

                    <img src="../images/logo.png" alt="Yuvalaya Logo">

                    <span class="badge">
                        Welcome Back 👋
                    </span>

                    <h1>
                        Continue Your Journey With Yuvalaya
                    </h1>

                    <p>
                        Login to participate in workshops, makerspace activities,
                        community events, volunteering opportunities and much more.
                    </p>

                </div>

            </div>

            <!-- Right Side -->

            <div class="login-right">

                <div class="login-card">

                    <h2>Login</h2>

                    <p>
                        Sign in to your account
                    </p>

                    <form id="loginForm">

                        <div class="input-group">

                            <label>Email Address</label>

                            <input
                                type="email"
                                id="email"
                                placeholder="Enter your email"
                                required>

                        </div>

                        <div class="input-group">

                            <label>Password</label>

                            <input
                                type="password"
                                id="password"
                                placeholder="Enter your password"
                                required>

                        </div>

                        <div class="options">

                            <label>

                                <input type="checkbox">

                                Remember Me

                            </label>

                            <a href="forgot-password.html">

                                Forgot Password?

                            </a>

                        </div>

                        <button type="submit">

                            Login

                        </button>

                    </form>

                    <div class="divider">

                        <span>OR</span>

                    </div>

                    <button class="google-btn">

                        <i class="ri-google-fill"></i>

                        Continue with Google

                    </button>

                    <div class="signup-link">

                        Don't have an account?

                        <a href="signup.html">

                            Create One

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <div id="footer"></div>

    <!-- Loaders -->

    <script src="../components/navbar-loader.js"></script>

    <script src="../components/footer-loader.js"></script>

    <script src="../components/navbar.js"></script>

    <!-- Authentication -->

    <script src="auth.js"></script>

</body>

</html>
